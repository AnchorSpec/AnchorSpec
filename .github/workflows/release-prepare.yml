name: Release (prepare)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == 'AnchorSpec/AnchorSpec'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # registry-url omitted: setting it causes setup-node to write _authToken=${NODE_AUTH_TOKEN}
          # to .npmrc, which resolves to empty and blocks npm's OIDC trusted-publisher exchange.

      - run: pnpm install --frozen-lockfile

      # Opens/updates the Version Packages PR; publishes when the Version PR merges
      # Auth: npm OIDC trusted publishing (id-token: write above). No NPM_TOKEN needed.
      # NPM_CONFIG_PROVENANCE=true triggers the OIDC token exchange with npmjs.com.
      - name: Create/Update Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore(release): version packages'
          createGithubReleases: true
          publish: pnpm run release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_CONFIG_PROVENANCE: 'true'
